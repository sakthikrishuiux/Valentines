<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday My Queen 👑</title>
    <style>
        :root {
            --primary-red: #ff2e63; /* Vibrant Ruby Red */
            --deep-red: #800000;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --red-glow: rgba(255, 46, 99, 0.4);
        }

        body {
            margin: 0;
            /* Deep Black to Crimson Gradient */
            background: radial-gradient(circle at center, #2e0000 0%, #000000 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- OVERLAY --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer;
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .click-text {
            font-size: 1.1rem;
            color: var(--primary-red);
            border: 1px solid var(--primary-red);
            padding: 12px 30px;
            border-radius: 50px;
            animation: pulse 1.5s infinite;
            margin-top: 25px;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--red-glow);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 var(--red-glow); }
            70% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 46, 99, 0); }
            100% { transform: scale(1); }
        }

        /* --- MAIN UI --- */
        .main-content { 
            padding: 40px 15px; 
            opacity: 0; 
            transition: 2s; 
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .premium-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 46, 99, 0.2);
            border-radius: 40px;
            padding: 40px 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
        }

        .bday-title {
            font-size: clamp(2.2rem, 9vw, 3.8rem);
            /* White to Red Gradient */
            background: linear-gradient(135deg, #fff 20%, var(--primary-red) 60%, var(--deep-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin: 10px 0;
            filter: drop-shadow(0 0 10px rgba(255, 46, 99, 0.3));
        }

        /* --- STYLISH 3D GALLERY --- */
        .photo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 50px 0;
            flex-wrap: wrap;
            perspective: 1000px;
        }

        .mockup-frame {
            position: relative;
            width: 180px;
            height: 260px;
            border-radius: 20px;
            border: 2px solid var(--primary-red);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 
                        0 0 20px var(--red-glow);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            background: #111;
        }

        .mockup-frame:hover {
            transform: translateY(-15px) rotateY(10deg) scale(1.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), 
                        0 0 40px var(--red-glow);
        }

        .card-left { transform: rotate(-5deg); }
        .card-center { transform: translateY(-25px); z-index: 2; border-width: 4px; }
        .card-right { transform: rotate(5deg); }

        @media (max-width: 600px) {
            .mockup-frame { width: 45%; height: 220px; }
            .card-center { transform: none; width: 60%; order: 3; margin-top: 10px; }
            .card-left, .card-right { transform: none; }
        }

        .mockup-frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        /* --- UI ELEMENTS --- */
        .visualizer {
            display: flex; justify-content: center; gap: 6px;
            height: 25px; margin-top: 25px;
        }
        .bar {
            width: 5px; height: 100%;
            background: linear-gradient(to top, var(--primary-red), #fff);
            border-radius: 10px;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        @keyframes bounce { from { transform: scaleY(0.4); } to { transform: scaleY(1.3); } }

        #loveMessage {
            font-size: 1.25rem;
            color: var(--primary-red);
            margin: 20px 0;
            min-height: 50px;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 46, 99, 0.5);
        }

        /* Floating Red Items */
        .floating-item { position: fixed; pointer-events: none; animation: floatUp 4s linear forwards; z-index: 999; }
        @keyframes floatUp {
            from { transform: translateY(100vh) scale(0.5); opacity: 1; }
            to { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

<body>

<div id="overlay" onclick="startExperience()">
    <p style="letter-spacing: 6px; color: var(--primary-red); font-size: 0.9rem;">04 . 03 . 2026</p>
    <h1 style="color:white; font-weight: 200; margin: 10px 0;">Happy Birthday</h1>
    <div style="font-size: 4.5rem; filter: drop-shadow(0 0 20px var(--primary-red));">❤️</div>
    <div class="click-text">Open Your Heart</div>
</div>

<div class="main-content" id="mainUI">
    <div class="premium-card">
        <p style="letter-spacing:4px; color:var(--primary-red); font-size: 0.8rem; text-transform: uppercase;">To My Dearest Thangame</p>
        <h1 class="bday-title">Happy Birthday!</h1>

        <div id="loveMessage"></div>

        <div class="photo-container">
            <div class="mockup-frame card-left"><img src="p1.jpg"></div>
            <div class="mockup-frame card-center"><img src="p2.jpg"></div>
            <div class="mockup-frame card-right"><img src="p3.jpg"></div>
        </div>

        <div class="visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>

        <div style="margin-top:35px; font-size:2rem;">🌹 ✨ 👑 ✨ 🌹</div>
    </div>
</div>

<audio id="mySong" loop preload="auto">
    <source src="nila.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    let started = false;

    function startExperience() {
        if (started) return;
        started = true;

        const song = document.getElementById("mySong");
        song.volume = 0;
        
        const playPromise = song.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                let fade = setInterval(() => {
                    if (song.volume < 0.7) {
                        song.volume += 0.05;
                    } else {
                        clearInterval(fade);
                    }
                }, 150);
            }).catch(e => console.log("Play blocked"));
        }

        document.getElementById("overlay").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("mainUI").style.opacity = "1";
        }, 1000);

        // Confetti explosion (Red, White, and Silver)
        confetti({ 
            particleCount: 200, 
            spread: 90, 
            origin: { y: 0.6 }, 
            colors: ['#ff2e63', '#800000', '#ffffff', '#ffccd5'] 
        });

        setInterval(createFloatingIcon, 400);
        typeWriter();
    }

    function createFloatingIcon() {
        const item = document.createElement('div');
        item.classList.add('floating-item');
        const icons = ['❤️', '🌹', '✨', '💖', '💋'];
        item.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        item.style.left = Math.random() * 95 + 'vw';
        item.style.fontSize = Math.random() * 15 + 15 + 'px';
        item.style.filter = "drop-shadow(0 0 5px var(--primary-red))";
        document.body.appendChild(item);
        setTimeout(() => item.remove(), 4000);
    }

    const text = "Aalathi Aalathi... You are the love that makes my life beautiful every single day! ❤️";
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            document.getElementById("loveMessage").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 70);
        }
    }
</script>

</body>
</html>
